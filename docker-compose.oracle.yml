# Oracle Cloud (Always Free): backend + Postgres only.
# Frontend stays on Vercel — set VITE_API_URL to http://YOUR_ORACLE_IP:8000/api
#
# Usage on the VM:
#   cp .env.example .env   # then edit
#   docker compose -f docker-compose.oracle.yml --env-file .env up --build -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoscoring}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoscoring}
      POSTGRES_DB: ${POSTGRES_DB:-autoscoring}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoscoring}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # DB stays private on the Docker network (not exposed to the internet)

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-autoscoring}:${POSTGRES_PASSWORD:-autoscoring}@db:5432/${POSTGRES_DB:-autoscoring}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  pgdata:
  model_cache:
  uploads_data:
